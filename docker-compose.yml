version: "3.9"

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pharma_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pharma_auth_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pharma_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Auth Service ────────────────────────────────────────────────────────────
  auth_service:
    build:
      context: ./backend/auth_service
      dockerfile: Dockerfile
    container_name: pharma_auth
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/pharma_auth_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DEBUG: "false"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Inventory Service ───────────────────────────────────────────────────────
  inventory_service:
    build:
      context: ./backend/inventory_service
      dockerfile: Dockerfile
    container_name: pharma_inventory
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/pharma_inventory_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      AUTH_SERVICE_URL: http://auth_service:8000
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      DEBUG: "false"
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─── Billing Service ─────────────────────────────────────────────────────────
  billing_service:
    build:
      context: ./backend/billing_service
      dockerfile: Dockerfile
    container_name: pharma_billing
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/pharma_billing_db
      INVENTORY_SERVICE_URL: http://inventory_service:8000
      AUTH_SERVICE_URL: http://auth_service:8000
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      DEBUG: "false"
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─── AI Service ──────────────────────────────────────────────────────────────
  ai_service:
    build:
      context: ./backend/ai_service
      dockerfile: Dockerfile
    container_name: pharma_ai
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/pharma_reporting_db
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      AI_PROVIDER: ${AI_PROVIDER:-groq}
      AUTH_SERVICE_URL: http://auth_service:8000
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      DEBUG: "false"
    ports:
      - "8004:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─── Reporting Service ───────────────────────────────────────────────────────
  reporting_service:
    build:
      context: ./backend/reporting_service
      dockerfile: Dockerfile
    container_name: pharma_reporting
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/pharma_reporting_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/3
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      DEBUG: "false"
    ports:
      - "8005:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─── Nginx API Gateway ───────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: pharma_gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - auth_service
      - inventory_service
      - billing_service
      - ai_service
      - reporting_service
      - frontend
    restart: unless-stopped

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: pharma_frontend
    depends_on:
      - auth_service
    restart: unless-stopped

  # ─── Celery Worker ───────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend/ai_service
      dockerfile: Dockerfile
    container_name: pharma_celery
    command: celery -A app.celery_app worker --loglevel=info -Q forecast,anomaly,notifications
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/pharma_reporting_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/4
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  # ─── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: pharma_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  # ─── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: pharma_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  grafana_data:

networks:
  default:
    name: pharma_network
    driver: bridge
